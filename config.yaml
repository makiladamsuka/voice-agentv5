# Voice Agent V5 isolated face tracking head config.

camera:
  face_model_path: face_detection_yunet_2023mar.onnx
  body_model_path: yolov8n.onnx
  body_enabled: true
  body_confidence_threshold: 0.35
  body_nms_threshold: 0.45
  body_input_size: 640
  body_detect_stride: 3
  body_track_servo_alpha: 0.30
  body_aim_y_ratio: 0.22
  body_cache_sec: 0.75
  main_res: [1920, 1080]
  detect_res: [1280, 720]
  confidence_threshold: 0.6
  nms_threshold: 0.3
  rotate_180: false
  stream_swap_rb: true

stream:
  enabled: true
  host: "0.0.0.0"
  port: 8081
  fps: 8
  jpeg_quality: 70
  render_fps: 24
  vision_fps: 10
  res: [320, 180]

imu:
  enabled: false   # use feature/imu branch + face_tracking_head_imu.py for BMI160 work

base:
  enabled: true
  # --- BASE CALIBRATION (change only via test_base_motor.py, not face-tracking tuning) ---
  counts_per_degree: 42.633333  # set by --calibrate-manual
  encoder_sign: -1  # set by --calibrate-manual (+deg → encoder counts decrease)
  command_scale: 0.6  # plate degrees; --relative 20 measured 5° → 0.15×(20/5)
  # --- behavior (safe to tune) ---
  error_backoff_sec: 45.0
  require_calibrated_cpd: true
  zero_on_start: false
  sign: -1.0          # plate rotation sign vs B command; flip if base opposes head
  head_lead_min_deg: 8.0   # neck must turn this far before base may follow
  follow_head_direction: true
  trigger_norm_x: 0.50
  trigger_hold_sec: 1.8
  cooldown_sec: 3.0
  min_step_deg: 5.0
  max_step_deg: 12.0
  single_shot_max_deg: 12.0
  norm_to_deg_gain: 7.0
  pan_soft_limit_deg: 16.0
  pan_recenter_bias: 0.35
  track_compensation_gain: 0.40
  fast_face_enabled: true
  fast_face_velocity_norm_sec: 3.5
  fast_face_cooldown_sec: 1.4
  fast_face_min_step_deg: 5.0
  fast_face_max_step_deg: 10.0
  fast_face_velocity_to_deg_gain: 2.0
  fast_face_compensation_gain: 0.45
  wander_enabled: true
  wander_step_deg: 8.0
  wander_cooldown_sec: 8.0
  wander_chance: 0.55
  wander_min_pan_offset_deg: 10.0
  wander_min_head_step_deg: 6.0
  wander_compensation_gain: 0.20
  max_total_auto_deg: 36.0
  allow_multi_face: false
  wait_for_ack: false

servo:
  enabled: true
  port: ""          # empty = auto-detect /dev/ttyUSB0, /dev/ttyUSB1, /dev/ttyACM0
  baud: 115200
  pan_min: 40.0
  pan_max: 120.0
  tilt_min: 100.0
  tilt_max: 120.0
  pan_center: 78.0   # mechanical center vs robot body (was 80)
  tilt_center: 112.0  # mechanical center vs robot body (was 110)
  pan_track_range: 26.0
  tilt_track_range: 12.0
  pan_sign: 1.0
  tilt_sign: -1.0
  deadzone_x: 0.06
  deadzone_y: 0.08
  loop_hz: 80.0
  no_face_home_sec: 0.8
  debug_hz: 2.0
  face_alpha_x: 0.20
  face_alpha_y: 0.14
  pan_pid_kp: 0.72
  pan_pid_ki: 0.01
  pan_pid_kd: 0.08
  tilt_pid_kp: 0.55
  tilt_pid_ki: 0.0
  tilt_pid_kd: 0.06
  pid_integral_limit: 0.40
  predict_hold_sec: 1.2
  predict_edge_norm: 0.55
  predict_gain: 0.72
  lost_search_hold_sec: 3.2
  lost_search_velocity_gain: 0.45
  lost_search_min_norm_x: 0.22
  lost_search_base_step_deg: 7.0
  lost_search_base_cooldown_sec: 1.6
  wander_pan_amp_deg: 20.0   # soft limit from center when picking direction
  wander_step_min_deg: 3.0
  wander_step_max_deg: 8.0   # small search steps, a bit larger than before
  wander_jump_chance: 0.0    # no teleport jumps to far pan angles
  wander_arrival_deg: 1.4
  wander_tilt_step_max_deg: 2.5
  wander_tilt_max_up_deg: 2.5
  wander_tilt_max_down_deg: 2.5
  wander_hold_min_sec: 0.6
  wander_hold_max_sec: 2.2
  wander_thinking_hold_chance: 0.22
  wander_thinking_hold_min_sec: 1.2
  wander_thinking_hold_max_sec: 3.0
  wander_long_stare_chance: 0.06
  wander_pan_smooth_hz: 4.8   # wander neck follow — between slow search and track
  wander_tilt_smooth_hz: 4.2
  motion_emotion_min_sec: 2.6
  attention_hold_min_sec: 3.2
  attention_hold_max_sec: 6.5
  multi_face_debounce_sec: 0.85
  multi_face_center_chance: 0.38
  multi_face_alternate_chance: 0.34
  multi_face_track_servo_alpha: 0.34
  multi_face_track_gain: 0.62
  social_multi_grace_sec: 2.4
  target_smooth_hz: 4.5   # face aim smoothing (replaces spring glide)
  pan_smooth_hz: 7.0    # neck pan follow — higher = snappier
  tilt_smooth_hz: 5.5   # neck tilt follow
  servo_send_min_deg: 0.04
  servo_send_hz: 30.0
  servo_angle_quantum_deg: 0.1
