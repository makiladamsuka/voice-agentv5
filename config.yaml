# Voice Agent V5 isolated face tracking head config.

camera:
  face_model_path: face_detection_yunet_2023mar.onnx
  body_model_path: yolov8n.onnx
  body_enabled: true
  body_confidence_threshold: 0.35
  body_nms_threshold: 0.45
  body_input_size: 640
  body_detect_stride: 3
  body_track_servo_alpha: 0.30
  body_aim_y_ratio: 0.22
  body_cache_sec: 0.75
  main_res: [1920, 1080]
  detect_res: [1280, 720]
  confidence_threshold: 0.6
  nms_threshold: 0.3
  rotate_180: false
  stream_swap_rb: true

stream:
  enabled: true
  host: "0.0.0.0"
  port: 8081
  fps: 8
  jpeg_quality: 70
  render_fps: 24
  vision_fps: 10
  res: [320, 180]

debug_viz:
  enabled: true
  host: "0.0.0.0"
  port: 8082

imu:
  enabled: true
  auto_level_on_start: true   # zero pitch/roll at startup upright pose
  auto_level_sec: 2.0         # still-sample window after servos settle
  auto_level_settle_sec: 0.8  # wait after T112 upright before IMU samples
  auto_level_warmup_sec: 0.3   # filter settle after IMU thread starts
  auto_level_gyro_max_dps: 8.0  # only average low-motion samples
  auto_level_min_samples: 40
  i2c_bus: 1
  address: 0x69
  sample_hz: 100
  roll_pitch_alpha: 0.02
  # PCB on head: +X up, +Y left, +Z back → forward=-Z, left=+Y, yaw-about-up=+X
  # Values are 1-based sensor axes (1=X, 2=Y, 3=Z); negative flips sign.
  axis_remap: [-3, 2, -1]
  # Used only when auto_level_on_start is false (manual test_imu.py calibration)
  roll_offset_deg: -7.34
  pitch_offset_deg: 12.84
  horizon_tilt_gain: 0.0
  horizon_tilt_sign: 1.0
  horizon_pitch_smooth_hz: 2.0
  horizon_max_bias_deg: 0.0
  horizon_max_pitch_deg: 12.0
  horizon_gyro_max_dps: 35.0       # ignore horizon when spinning/moving
  horizon_max_up_from_center_deg: 0.0
  horizon_max_down_from_center_deg: 0.0

base:
  enabled: true
  # --- BASE CALIBRATION (change only via test_base_motor.py, not face-tracking tuning) ---
  counts_per_degree: 31.166667  # set by --calibrate-manual# set by --calibrate-manual
  encoder_sign: -1  # set by --calibrate-manual# set by --calibrate-manual (+deg → encoder counts decrease)
  command_scale: 0.6  # plate degrees; --relative 20 measured 5° → 0.15×(20/5)
  # --- behavior (safe to tune) ---
  error_backoff_sec: 45.0
  require_calibrated_cpd: true
  zero_on_start: false
  sign: -1.0          # plate rotation sign vs B command; flip if base opposes head
  head_lead_min_deg: 4.0   # neck must turn this far before base may follow
  follow_head_direction: true
  trigger_norm_x: 0.35
  trigger_hold_sec: 0.7
  cooldown_sec: 1.2
  min_step_deg: 2.0
  max_step_deg: 5.0
  single_shot_max_deg: 5.0
  norm_to_deg_gain: 4.5
  pan_soft_limit_deg: 10.0
  pan_recenter_bias: 0.22
  track_compensation_gain: 0.30
  fast_face_enabled: false
  fast_face_velocity_norm_sec: 3.5
  fast_face_cooldown_sec: 1.4
  fast_face_min_step_deg: 5.0
  fast_face_max_step_deg: 10.0
  fast_face_velocity_to_deg_gain: 2.0
  fast_face_compensation_gain: 0.45
  wander_enabled: false
  wander_step_deg: 3.0
  wander_cooldown_sec: 8.0
  wander_chance: 0.20
  wander_min_pan_offset_deg: 10.0
  wander_min_head_step_deg: 6.0
  wander_compensation_gain: 0.20
  max_total_auto_deg: 36.0
  max_yaw_deg: 120.0
  recenter_deadband_deg: 15.0
  recenter_step_deg: 5.0
  heading_pid_kp: 0.35
  heading_pid_kd: 0.08
  use_imu_move_validation: true
  allow_multi_face: false
  wait_for_ack: false

servo:
  enabled: true
  port: ""          # empty = auto-detect /dev/ttyUSB0, /dev/ttyUSB1, /dev/ttyACM0
  baud: 115200
  pan_min: 55.0
  pan_max: 90.0
  tilt_min: 112.0
  tilt_max: 116.0
  pan_center: 73.0
  tilt_center: 114.0  # mechanical upright (0°)
  # Servo cmd units != physical degrees. Calibrate: at full look-up, note T cmd vs real angle.
  tilt_mechanical_scale: 3.0   # mech° = (tilt_cmd - tilt_center) * scale  (e.g. +15 cmd → +45°)
  tilt_max_mechanical_deg: 45.0
  tilt_min_mechanical_deg: -35.0
  pan_mech_left_deg: -40.0
  pan_mech_right_deg: 40.0
  pan_track_range: 18.0
  tilt_track_range: 2.0
  pan_sign: 1.0
  tilt_sign: -1.0
  deadzone_x: 0.03
  deadzone_y: 0.05
  loop_hz: 80.0
  no_face_home_sec: 0.8
  debug_hz: 2.0
  face_alpha_x: 0.18
  face_alpha_y: 0.12
  pan_pid_kp: 0.58
  pan_pid_ki: 0.006
  pan_pid_kd: 0.07
  tilt_pid_kp: 0.38
  tilt_pid_ki: 0.0
  tilt_pid_kd: 0.06
  pid_integral_limit: 0.40
  predict_hold_sec: 1.0
  predict_edge_norm: 0.55
  predict_gain: 0.72
  lost_search_hold_sec: 0.6
  lost_search_velocity_gain: 0.30
  lost_search_min_norm_x: 0.22
  lost_search_base_step_deg: 3.0
  lost_search_base_cooldown_sec: 4.0
  wander_pan_amp_deg: 10.0   # soft limit from center when picking direction
  wander_step_min_deg: 1.0
  wander_step_max_deg: 3.0   # small search steps so camera can settle
  wander_jump_chance: 0.0    # no teleport jumps to far pan angles
  wander_arrival_deg: 1.4
  wander_tilt_step_max_deg: 0.15
  wander_tilt_max_up_deg: 0.2
  wander_tilt_max_down_deg: 0.2   # keep wander close to eye-level
  wander_hold_min_sec: 1.2
  wander_hold_max_sec: 3.2
  wander_thinking_hold_chance: 0.22
  wander_thinking_hold_min_sec: 1.2
  wander_thinking_hold_max_sec: 3.0
  wander_long_stare_chance: 0.06
  wander_pan_smooth_hz: 4.8   # wander neck follow — between slow search and track
  wander_tilt_smooth_hz: 4.2
  motion_emotion_min_sec: 2.6
  attention_hold_min_sec: 3.2
  attention_hold_max_sec: 6.5
  multi_face_debounce_sec: 0.85
  multi_face_center_chance: 0.38
  multi_face_alternate_chance: 0.34
  multi_face_track_servo_alpha: 0.34
  multi_face_track_gain: 0.62
  social_multi_grace_sec: 2.4
  target_smooth_hz: 4.0   # face aim smoothing (replaces spring glide)
  pan_smooth_hz: 5.2    # neck pan follow — higher = snappier
  tilt_smooth_hz: 4.0   # neck tilt follow
  servo_send_min_deg: 0.04
  servo_send_hz: 45.0
  servo_angle_quantum_deg: 0.1
  home_smooth_sec: 0.9
  home_smooth_hz: 30.0
