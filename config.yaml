# Voice Agent V5 isolated face tracking head config.

camera:
  face_model_path: face_detection_yunet_2023mar.onnx
  body_model_path: yolov8n.onnx
  body_enabled: true
  body_confidence_threshold: 0.35
  body_nms_threshold: 0.45
  body_input_size: 640
  body_detect_stride: 3
  body_track_servo_alpha: 0.30
  body_aim_y_ratio: 0.22
  body_cache_sec: 0.75
  main_res: [1920, 1080]
  detect_res: [1280, 720]
  confidence_threshold: 0.6
  nms_threshold: 0.3
  rotate_180: false
  stream_swap_rb: true

stream:
  enabled: true
  host: "0.0.0.0"
  port: 8081
  fps: 8
  jpeg_quality: 70
  render_fps: 24
  vision_fps: 10
  res: [320, 180]

imu:
  enabled: true
  i2c_bus: 1
  address: 0x69
  sample_hz: 100
  roll_pitch_alpha: 0.02
  gyro_runaway_scale: 1.5
  gyro_slip_scale: 0.25
  max_move_deg: 12.0
  # PCB on head: +X up, +Y left, +Z back → forward=-Z, left=+Y, yaw-about-up=+X
  # Values are 1-based sensor axes (1=X, 2=Y, 3=Z); negative flips sign.
  axis_remap: [-3, 2, -1]
  # Validated: face-down (front on table) → pitch ~+85°, acc forward ≈ -1g (gravity along -forward).
  # Level-calibrate and normal tracking: use upright head pose (roll/pitch should be ~0°).
  mount_offset_deg: 0.0
  # Level offsets at mechanical center (servo P78 T112); IMU roll/pitch read ~0° there.
  roll_offset_deg: -171.4
  pitch_offset_deg: -1.1
  # BMI160 alone has no magnetometer. Combo boards (BMM150 at 0x10) need extra support;
  # turn/runaway guard uses gyro integration on the up axis above, not mag heading.

base:
  enabled: true        # turn on after flashing v5 firmware and calibrating counts_per_degree
  counts_per_degree: 25.0
  error_backoff_sec: 45.0
  require_calibrated_cpd: true
  zero_on_start: false
  sign: 1.0
  trigger_norm_x: 0.52
  trigger_hold_sec: 1.2
  cooldown_sec: 2.4
  min_step_deg: 3.0
  max_step_deg: 10.0
  norm_to_deg_gain: 8.0
  pan_soft_limit_deg: 18.0
  pan_recenter_bias: 0.35
  track_compensation_gain: 0.45
  fast_face_enabled: true
  fast_face_velocity_norm_sec: 3.0
  fast_face_cooldown_sec: 0.9
  fast_face_min_step_deg: 4.0
  fast_face_max_step_deg: 10.0
  fast_face_velocity_to_deg_gain: 2.2
  fast_face_compensation_gain: 0.55
  wander_enabled: true
  wander_step_deg: 5.0
  wander_cooldown_sec: 5.5
  wander_min_pan_offset_deg: 10.0
  wander_compensation_gain: 0.25
  max_total_auto_deg: 60.0
  allow_multi_face: false
  wait_for_ack: false

servo:
  enabled: true
  port: ""          # empty = auto-detect /dev/ttyUSB0, /dev/ttyUSB1, /dev/ttyACM0
  baud: 115200
  pan_min: 40.0
  pan_max: 120.0
  tilt_min: 100.0
  tilt_max: 120.0
  pan_center: 78.0   # mechanical center vs robot body (was 80)
  tilt_center: 112.0  # mechanical center vs robot body (was 110)
  pan_track_range: 26.0
  tilt_track_range: 12.0
  pan_sign: 1.0
  tilt_sign: -1.0
  deadzone_x: 0.04
  deadzone_y: 0.06
  loop_hz: 100.0
  no_face_home_sec: 0.8
  debug_hz: 2.0
  face_alpha_x: 0.22
  face_alpha_y: 0.12
  pan_pid_kp: 0.95
  pan_pid_ki: 0.02
  pan_pid_kd: 0.14
  tilt_pid_kp: 0.75
  tilt_pid_ki: 0.0
  tilt_pid_kd: 0.12
  pid_integral_limit: 0.6
  predict_hold_sec: 1.2
  predict_edge_norm: 0.55
  predict_gain: 0.72
  lost_search_hold_sec: 3.2
  lost_search_velocity_gain: 0.45
  lost_search_min_norm_x: 0.22
  lost_search_base_step_deg: 5.0
  lost_search_base_cooldown_sec: 1.2
  wander_pan_amp_deg: 26.0
  wander_step_min_deg: 6.0
  wander_step_max_deg: 28.0
  wander_hold_min_sec: 1.3
  wander_hold_max_sec: 5.8
  wander_jump_chance: 0.34
  wander_arrival_deg: 2.0
  wander_tilt_max_up_deg: 3.0
  wander_tilt_max_down_deg: 3.5
  wander_thinking_hold_chance: 0.34
  wander_thinking_hold_min_sec: 3.0
  wander_thinking_hold_max_sec: 7.5
  wander_long_stare_chance: 0.12
  wander_pan_target_alpha: 0.10
  wander_tilt_target_alpha: 0.075
  motion_emotion_min_sec: 2.6
  attention_hold_min_sec: 3.2
  attention_hold_max_sec: 6.5
  multi_face_debounce_sec: 0.85
  multi_face_center_chance: 0.38
  multi_face_alternate_chance: 0.34
  multi_face_track_servo_alpha: 0.34
  multi_face_track_gain: 0.62
  social_multi_grace_sec: 2.4
  target_glide_freq: 1.45
  target_glide_damp: 1.05
  pan_max_vel: 16.0
  pan_accel: 34.0
  pan_decel: 52.0
  pan_track_gain: 1.6
  tilt_max_vel_up: 10.0
  tilt_max_vel_down: 6.0
  tilt_accel: 28.0
  tilt_decel: 42.0
  tilt_decel_down_mult: 1.85
  head_vel_blend: 0.28
  tilt_head_vel_blend: 0.14
  tilt_track_gain: 2.0
  goal_deadband_deg: 0.04
